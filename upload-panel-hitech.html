<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Hi Tech Sofa Admin Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
  text-align:center;
}

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

select,
input[type=file],
button{
  width:100%;
  padding:12px;
  margin-top:8px;
}

button{
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#084fc7;
}

#status{
  margin-top:20px;
  font-weight:bold;
}

#previewContainer{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  margin-top:15px;
}

.preview-card{
  border:1px solid #ddd;
  border-radius:8px;
  padding:5px;
  background:#fff;
  text-align:center;
}

.preview-card img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:6px;
}

.preview-card p{
  font-size:12px;
  margin-top:5px;
  word-break:break-word;
}

.category-filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.admin-filter{
  width:auto;
  padding:10px 15px;
}

.admin-filter.active{
  background:#198754;
}

#photoGallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  margin-top:20px;
}

.admin-card{
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  background:#fff;
}

.admin-card img{
  width:100%;
  height:120px;
  object-fit:cover;
  display:block;
}

.admin-card p{
  font-size:12px;
  padding:8px;
  margin:0;
  word-break:break-word;
}

.delete-btn{
  width:100%;
  background:#dc3545;
  border:none;
  color:white;
  padding:10px;
  cursor:pointer;
}

.delete-btn:hover{
  background:#b02a37;
}
</style>
</head>

<body>

<div id="loginSection">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<div id="uploadSection" style="display:none">

<div class="container">

<h1>Hi Tech Sofa Upload</h1>

<label>Category</label>

<select id="category">
  <option>Sofa</option>
  <option>Beds</option>
  <option>Dining Table</option>
  <option>Bedroom Chair</option>
  <option>Making Sofa</option>
</select>

<label>Select Images</label>


<input
  type="file"
  id="images"
  multiple
  accept="image/*">

<div id="previewContainer"></div>

<button onclick="uploadImages()">
Upload Images
</button>
<button onclick="logout()">
  Logout
</button>
<div id="status"></div>

<hr style="margin:30px 0">

<h2>Manage Photos</h2>
<div class="category-filters">

  <button class="admin-filter active"
          data-category="All">
    All
  </button>

  <button class="admin-filter"
          data-category="Bedroom Chair">
    Bedroom Chair
  </button>

  <button class="admin-filter"
          data-category="Beds">
    Beds
  </button>

  <button class="admin-filter"
          data-category="Dining Table">
    Dining Table
  </button>

  <button class="admin-filter"
          data-category="Making Sofa">
    Making Sofa
  </button>

  <button class="admin-filter"
          data-category="Sofa">
    Sofa
  </button>

</div>

<p id="photoCount"></p>

<div id="photoGallery"></div>

</div>

</div>

<script>

const supabaseUrl =
'https://efobfvnvkpciavnszxtq.supabase.co';

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmb2Jmdm52a3BjaWF2bnN6eHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Mzg5MzQsImV4cCI6MjA5NjExNDkzNH0.23L0TKA7pVPvaIEvOr1xiXTCvSDj3MYatDH0IS-kc3A';

const sb =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

let allPhotos = [];

async function loadImages() {

  const gallery =
    document.getElementById('photoGallery');

  gallery.innerHTML = 'Loading...';

  const { data, error } =
    await sb
      .from('Sofa Gallary')
      .select('*')
      .order('id', { ascending:false });

  if(error){
    gallery.innerHTML =
      'Failed to load images';
    return;
  }

  gallery.innerHTML = '';

  allPhotos = data;

  renderPhotos(data);

}

function renderPhotos(images){

  const gallery =
    document.getElementById('photoGallery');

  const count =
    document.getElementById('photoCount');

  gallery.innerHTML = '';

  count.innerHTML =
    `${images.length} images`;

  images.forEach(item => {

    const card =
      document.createElement('div');

    card.className =
      'admin-card';

    card.innerHTML = `
      <img src="${item.image_url}">

      <p>${item.category}</p>

      <button
        class="delete-btn"
        onclick="deleteImage(
          ${item.id},
          '${item.image_url}'
        )">
        Delete
      </button>
    `;

    gallery.appendChild(card);

  });

}

function setupFilters(){

  const buttons =
    document.querySelectorAll(
      '.admin-filter'
    );

  buttons.forEach(btn => {

    btn.addEventListener(
      'click',
      () => {

        buttons.forEach(b =>
          b.classList.remove(
            'active'
          )
        );

        btn.classList.add(
          'active'
        );

        const category =
          btn.dataset.category;

        if(category === 'All'){

          renderPhotos(
            allPhotos
          );

        }
        else{

          renderPhotos(

            allPhotos.filter(
              item =>
              item.category ===
              category
            )

          );

        }

      }
    );

  });

}

async function login() {

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  const { error } =
    await sb.auth.signInWithPassword({
      email,
      password
    });

  if(error) {
    alert(error.message);
    return;
  }

  document.getElementById('loginSection')
    .style.display = 'none';

  document.getElementById('uploadSection')
    .style.display = 'block';

  loadImages();

  resetInactivityTimer();

}

const prefixMap = {
  "Bedroom Chair": "bedroom_chair",
  "Beds": "bed_back",
  "Dining Table": "dining_table",
  "Making Sofa": "making_sofa",
  "Sofa": "sofa"
};

const BUCKET = 'Sofa Gallary';

document
  .getElementById('images')
  .addEventListener('change', showPreview);

function showPreview(){

  const files =
    document.getElementById('images').files;

  const container =
    document.getElementById('previewContainer');

  container.innerHTML = '';

  for(const file of files){

    const reader = new FileReader();

    reader.onload = function(e){

      const card =
        document.createElement('div');

      card.className = 'preview-card';

      card.innerHTML = `
        <img src="${e.target.result}">
        <p>${file.name}</p>
      `;

      container.appendChild(card);

    };

    reader.readAsDataURL(file);

  }

}

async function uploadImages(){

const files =
document.getElementById('images').files;

const category =
document.getElementById('category').value;

const status =
document.getElementById('status');

if(files.length === 0){
  alert('Please select images');
  return;
}

for(let i=0;i<files.length;i++){

  const file = files[i];

  status.innerHTML =
  `Uploading ${i+1} of ${files.length}`;

  const prefix = prefixMap[category];

  const ext =
    file.name.split('.').pop().toLowerCase();

  const fileName =
    `${prefix}_${Date.now()}_${i}.${ext}`;

  const filePath =
  `${category}/${fileName}`;

  const uploadResult =
  await sb.storage
    .from(BUCKET)
    .upload(
      filePath,
      file
    );

  if(uploadResult.error){

    console.error(uploadResult.error);

    continue;
  }

  const imageUrl =
  `${supabaseUrl}/storage/v1/object/public/${encodeURIComponent(BUCKET)}/${filePath}`;

  await sb
    .from('Sofa Gallary')
    .insert({
      title: fileName,
      category: category,
      image_url: imageUrl
    });

}

status.innerHTML =
'✅ Upload Complete';

loadImages();

document
  .getElementById('images')
  .value = '';

document
  .getElementById('previewContainer')
  .innerHTML = '';

}

async function deleteImage(
  id,
  imageUrl
) {

  const confirmation =
    prompt(
      'Type DELETE to remove this image'
    );

  if(
    confirmation !== 'DELETE'
  ){
    return;
  }

  try {

    const filePath =
      decodeURIComponent(imageUrl)
      .split(
        '/object/public/Sofa Gallary/'
      )[1];

    const {
      error: storageError
    } =
    await sb.storage
      .from('Sofa Gallary')
      .remove([filePath]);

    if(storageError)
      throw storageError;

    const {
      error: dbError
    } =
    await sb
      .from('Sofa Gallary')
      .delete()
      .eq('id', id);

    if(dbError)
      throw dbError;

    alert('Deleted successfully');

    loadImages();

  }
  catch(error){

    console.error(error);

    alert('Delete failed');

  }

}

async function logout() {

  await sb.auth.signOut();

  location.reload();

}

document.addEventListener(
  'DOMContentLoaded',
  async () => {

    setupFilters();

    const {
      data: { session }
    } = await sb.auth.getSession();

    if(session) {
      
      document.getElementById('loginSection')
        .style.display = 'none';

      document.getElementById('uploadSection')
        .style.display = 'block';

      loadImages();

      resetInactivityTimer();

    } else {

      document.getElementById('loginSection')
        .style.display = 'block';

      document.getElementById('uploadSection')
        .style.display = 'none';

    }

  }
);

let inactivityTimer;

function resetInactivityTimer() {

  clearTimeout(inactivityTimer);

  inactivityTimer = setTimeout(
    async () => {

      await sb.auth.signOut();

      alert(
        'Session expired due to inactivity'
      );

      location.reload();

    },
    30 * 60 * 1000 // 30 minutes
  );

}

[
  'mousemove',
  'mousedown',
  'keypress',
  'touchstart',
  'scroll'
].forEach(event => {

  document.addEventListener(
    event,
    resetInactivityTimer
  );

});

</script>

</body>
</html>
